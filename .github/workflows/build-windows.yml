name: Build Windows Portable ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies (including native modules)
        run: npm install --include=optional

      - name: Build production app
        run: npm run build

      - name: Verify native modules
        run: node -e "require('nfc-pcsc'); console.log('nfc-pcsc OK')"

      - name: Download Node.js portable
        shell: pwsh
        run: |
          $url = "https://nodejs.org/dist/v22.15.0/node-v22.15.0-win-x64.zip"
          Invoke-WebRequest -Uri $url -OutFile node-portable.zip
          Expand-Archive -Path node-portable.zip -DestinationPath .
          Rename-Item "node-v22.15.0-win-x64" "node"
          Remove-Item node-portable.zip

      - name: Assemble portable distribution
        shell: pwsh
        run: |
          $dist = "3dball-portable"
          New-Item -ItemType Directory -Path $dist -Force | Out-Null

          # Copy app directories
          foreach ($d in @("app", "lib", "public", "types", "scripts")) {
            if (Test-Path $d) { Copy-Item $d "$dist\$d" -Recurse }
          }

          # Copy root files
          $files = @("package.json", "package-lock.json", "next.config.ts",
                     "tsconfig.json", "postcss.config.mjs", "eslint.config.mjs",
                     "middleware.ts", "next-env.d.ts", "start.bat")
          foreach ($f in $files) {
            if (Test-Path $f) { Copy-Item $f "$dist\" }
          }

          # Copy .next (exclude cache) - robocopy returns 0-7 on success
          robocopy .next "$dist\.next" /E /NFL /NDL /NJH /NJS /NC /NS /NP /XD cache
          if ($LASTEXITCODE -ge 8) { throw "robocopy .next failed with code $LASTEXITCODE" }

          # Copy node_modules
          robocopy node_modules "$dist\node_modules" /E /NFL /NDL /NJH /NJS /NC /NS /NP
          if ($LASTEXITCODE -ge 8) { throw "robocopy node_modules failed with code $LASTEXITCODE" }

          # Copy portable Node.js
          Copy-Item node "$dist\node" -Recurse

          # Create empty data directory
          New-Item -ItemType Directory -Path "$dist\data" -Force | Out-Null

          # Reset exit code so GitHub Actions doesn't fail
          $global:LASTEXITCODE = 0

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 3dball-portable
          path: 3dball-portable/
          retention-days: 30
